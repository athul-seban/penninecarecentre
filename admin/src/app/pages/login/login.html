<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-mark"></div>
      <h1>Pennine Care Centre</h1>
      <p>Admin Panel</p>
    </div>
    <form (ngSubmit)="login()" #loginForm="ngForm" class="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          placeholder="admin@pinnineCare.com"
          [disabled]="loading"
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="••••••••"
          [disabled]="loading"
        />
      </div>
      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }
      <button type="submit" class="login-btn" [disabled]="loading || !email || !password">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
      <p class="hint">Default: admin&#64;pinnineCare.com / Admin&#64;123</p>
    </form>
  </div>
</div>

<div id="top">
<header class="hero-sub">
  <div class="hero-content">
    <p>We'd love to hear from you</p>
    <h1>Stay Connected</h1>
  </div>
</header>

<section class="contact-container reveal-element">
  <div class="contact-info">
    <h2 class="section-title-line">Reach us through</h2>

    <div class="info-item">
      <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
      <p>Pennine Care Centre<br />Turnlee Road, Glossop, Derbyshire, SK13 6JW</p>
    </div>

    <div class="info-item">
      <i class="fas fa-phone" aria-hidden="true"></i>
      <p>01457 862466 <span style="opacity: 0.75; font-size: 0.95rem">(General Enquiries)</span></p>
    </div>

    <div class="info-item">
      <i class="fas fa-envelope-open-text" aria-hidden="true"></i>
      <p>Admin&#64;nyms-services.com</p>
    </div>

    <div class="map-wrapper">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2376.868486526857!2d-1.9585225!3d53.4350597!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x487bcb8dea4cf4d1%3A0xd8e4bf659910976f!2sPennine%20Care%20Centre!5e0!3m2!1sen!2sin!4v1779295008934!5m2!1sen!2sin"
        loading="lazy"
        title="Pennine Care Centre Google Maps Location">
      </iframe>
    </div>
  </div>

  <div class="contact-form-wrapper">
    <h3>Send us a Message</h3>
    <form (ngSubmit)="onSubmit()" #form="ngForm">
      <div class="form-group">
        <input type="text" name="name" [(ngModel)]="contactForm.name" placeholder="Your Name" required />
      </div>
      <div class="form-group">
        <input type="email" name="email" [(ngModel)]="contactForm.email" placeholder="Your Email" required />
      </div>
      <div class="form-group">
        <input type="tel" name="phone" [(ngModel)]="contactForm.phone" placeholder="Phone Number" />
      </div>
      <div class="form-group">
        <textarea name="message" [(ngModel)]="contactForm.message" rows="6" placeholder="How can we help you?" required></textarea>
      </div>
      <button type="submit" class="btn-submit">Send Message</button>
    </form>
  </div>
</section>
</div>
